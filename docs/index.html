<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhou Shen Global Wishes & Events</title>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <link href='css/styles.css' rel='stylesheet' />
</head>
<body>
    <div class="container">
        <div id="map">
            <div class="map-legend">
                <h2>Zhou Shen Global Map</h2>
                <div class="layer-controls">
                    <label>
                        <input type="checkbox" id="fan-wishes" checked>
                        💌 Fan Wishes
                    </label>
                    <label>
                        <input type="checkbox" id="singer-activities" checked>
                        🎤 Singer Activities
                    </label>
                    <label>
                        <input type="checkbox" id="fan-meetups" checked>
                        🎉 Past Meetups
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Panel -->
    <div id="detail-panel" class="detail-panel">
        <button class="close-panel">&times;</button>
        <div class="detail-content">
            <div id="detail-header"></div>
            <div id="detail-carousel" class="carousel"></div>
            <div id="detail-info"></div>
            <div id="detail-links"></div>
        </div>
    </div>

    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <script src="js/config.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
